name: Katabump Auto Renew

on:
  schedule:
  - cron: '22 1 * * *'  # 仅修改此行：改为每天 UTC 1点22分 运行，脚本内部会判断是否跳过
  workflow_dispatch: # 允许手动触发

jobs:
  Renew-Katabump:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: write  # 新增：必须添加此权限，否则无法将 time.txt 推送回代码库
    
    steps:
    - uses: actions/checkout@v6
    - name: ⚙ 设置 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 🛠️ 安装系统依赖和python依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    - name: ⚙ 设置代理 (sing-box)
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

    - name: 🚀 运行续期脚本
      env:
        KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
        KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        RENEW_CYCLE: 4  # 新增：在此定义你的周期参数n (比如 3)
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 app.py
          
    # 新增：判断如果有 time.txt 生成/修改，则推送到仓库保存 (仅在你唯一的 main 分支上操作)
    - name: 💾 保存最新续期时间到仓库
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add time.txt || true
        if git diff --staged --quiet; then
          echo "time.txt 未发生变化，无需提交。"
        else
          git commit -m "chore: auto record successful renew date [skip ci]"
          git push
          echo "✅ 最新续期时间已保存！"
        fi
        
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
