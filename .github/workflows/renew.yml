name: Katabump Auto Renew

on:
  schedule:
  - cron: '22 1 * * *'  
  workflow_dispatch: 

jobs:
  Renew-Katabump:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: write 
    
    # 将周期提出来作为全局变量，既给前面的拦截用，也给后面的 Python 脚本用
    env:
      RENEW_CYCLE: 4 

    steps:
    - uses: actions/checkout@v6

    # ---------- 新增：核心拦截器 ----------
    - name: ⏱️ 前置检查：是否需要执行续期
      id: check_time
      run: |
        if [ -f "time.txt" ]; then
          # 直接调用 ubuntu 镜像自带的基础 python 执行一句话日期对比
          SKIP=$(python3 -c "from datetime import datetime, timedelta; print('true') if datetime.now().date() < datetime.strptime(open('time.txt').read().strip(), '%Y-%m-%d').date() + timedelta(days=$RENEW_CYCLE) else print('false')")
          if [ "$SKIP" == "true" ]; then
            echo "🛑 尚未到达设定的 ${RENEW_CYCLE} 天周期，触发拦截，跳过后续所有环境安装和执行步骤。"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
        fi
        echo "✅ 达到续期时间，继续执行。"
        echo "skip=false" >> $GITHUB_OUTPUT
    # --------------------------------------

    - name: ⚙ 设置 Python
      if: steps.check_time.outputs.skip != 'true' # 只有时间到了才装 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 🛠️ 安装系统依赖和python依赖
      if: steps.check_time.outputs.skip != 'true' # 只有时间到了才装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    - name: ⚙ 设置代理 (sing-box)
      if: steps.check_time.outputs.skip != 'true' # 只有时间到了才设代理
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

    - name: 🚀 运行续期脚本
      if: steps.check_time.outputs.skip != 'true' # 只有时间到了才跑脚本
      env:
        KATABUMP_EMAIL: ${{ secrets.KATABUMP_EMAIL }}
        KATABUMP_PASSWORD: ${{ secrets.KATABUMP_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 app.py
          
    - name: 💾 保存最新续期时间到仓库
      if: steps.check_time.outputs.skip != 'true' # 只有跑了脚本才需要尝试提交
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add time.txt || true
        if git diff --staged --quiet; then
          echo "time.txt 未发生变化，无需提交。"
        else
          git commit -m "chore: auto record successful renew date [skip ci]"
          git push
          echo "✅ 最新续期时间已保存！"
        fi
        
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
